name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Require pnpm >= 11
        shell: bash
        run: |
          pnpm --version
          node -e "
            const v = process.env.npm_config_user_agent?.match(/pnpm\/(\S+)/)?.[1];
            if (!v) throw new Error('Could not detect pnpm version');
            const [maj] = v.split('.').map(Number);
            if (maj < 11) throw new Error('pnpm ' + v + ' is too old; need >= 11');
          "

      - name: Install dependencies
        run: pnpm run install:hardened

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm test
