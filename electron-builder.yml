appId: com.vyotiq.app
productName: Vyotiq
copyright: Copyright © Vyotiq

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

asar: true
asarUnpack:
  - node_modules/node-pty/**/*
  - node_modules/@ast-grep/napi/**/*
  - node_modules/@photostructure/sqlite-vec/**/*

# Native deps ship prebuilds (node-pty, @ast-grep/napi, sqlite-vec). Rebuilding
# requires MSVC Spectre-mitigated libs on Windows and is unnecessary for dist.
npmRebuild: false

afterPack: scripts/afterPackFlipFuses.cjs

# Used by `npm run dist:publish` — set UPDATE_BASE_URL in CI.
publish:
  provider: generic
  url: ${env.UPDATE_BASE_URL}

win:
  target:
    - nsis
  artifactName: Vyotiq-${version}-${os}-${arch}.${ext}
  signAndEditExecutable: true

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

mac:
  target:
    - dmg
    - zip
  artifactName: Vyotiq-${version}-${os}-${arch}.${ext}
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true

linux:
  target:
    - AppImage
  artifactName: Vyotiq-${version}-${os}-${arch}.${ext}
  category: Development
